# AgentKit SaaS — Docker Compose (desarrollo)

services:
  backend:
    build: ./backend
    ports:
      - "${PORT:-8000}:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://agentkit:agentkit@postgres:5432/agentkit
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-in-production}
      - ENVIRONMENT=development
      - CORS_ORIGINS=http://localhost:3000
      - PORT=8000
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: agentkit
      POSTGRES_USER: agentkit
      POSTGRES_PASSWORD: agentkit
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentkit"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
